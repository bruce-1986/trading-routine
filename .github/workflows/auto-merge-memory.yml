name: Auto-merge claude/* (memory only)

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout mit voller History
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Prüfen, ob nur memory/ geändert wurde
        id: diff
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only origin/main...HEAD)
          echo "Geänderte Dateien:"; echo "$CHANGED"
          if [ -z "$CHANGED" ]; then
            echo "result=empty" >> "$GITHUB_OUTPUT"; exit 0
          fi
          NON_MEMORY=$(echo "$CHANGED" | grep -v '^memory/' || true)
          if [ -z "$NON_MEMORY" ]; then
            echo "result=memory_only" >> "$GITHUB_OUTPUT"
          else
            echo "result=mixed" >> "$GITHUB_OUTPUT"
            echo "Nicht-memory-Dateien gefunden — Branch bleibt offen:"
            echo "$NON_MEMORY"
          fi

      - name: Merge nach main (nur bei memory-only)
        if: steps.diff.outputs.result == 'memory_only'
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"
          git config user.name  "Bull Auto-Merge"
          git config user.email "bot@trading-routine"
          git checkout main
          git merge --no-ff "origin/$BRANCH" -m "auto-merge: $BRANCH (memory-only)"
          git push origin main
          git push origin --delete "$BRANCH"
